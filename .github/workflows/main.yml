name: Greeting Java

on:
  workflow_dispatch:

jobs:
  greeting-java-job:
    name: Greeting Java Job
    runs-on: self-hosted
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build with Maven Wrapper
        run: ./mvnw clean package -DskipTests

      - name: Deploy war file
        run: copy target\*.war E:\tomcat-11\webapps
