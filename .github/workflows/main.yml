name: Greeting Java

on:
  workflow_dispatch:

jobs:
  greeting-java-job:
    name: Greeting Java Job
    runs-on: self-hosted
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Build with Maven Wrapper
        run: ./mvnw clean package -DskipTests -DproxySet=true -Dhttp.proxyHost=192.168.22.251 -Dhttp.proxyPort=8888 -Dmaven.wagon.http.ssl.insecure=true -Dmaven.wagon.http.ssl.allowall=true

      - name: Deploy war file
        run: copy target\*.war E:\tomcat-11\webapps
