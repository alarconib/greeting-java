name: Greeting Java

on:
  workflow_dispatch:

jobs:
  greeting-java-job:
    name: Greeting Java Job
    runs-on: self-hosted
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build with Maven Wrapper
        shell: cmd
        run: E:\maven-3\bin\mvn -e clean package

      - name: Deploy war file
        shell: cmd
        run: copy target\*.war E:\tomcat-11\webapps
