name: Greeting Java

on:
  workflow_dispatch:

jobs:
  greeting-java-job:
    name: Greeting Java Job
    runs-on: self-hosted
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
          clean: true

      - name: Build with Maven Wrapper
        shell: cmd
        run: E:\maven-3\bin\mvn -e clean package -Daether.connector.https.securityMode=insecure

      - name: Deploy war file
        run: copy target\*.war E:\tomcat-11\webapps
